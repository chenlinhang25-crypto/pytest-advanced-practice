name: Pytest CI

on:
  push:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pytest requests

      - name: Run tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          pytest tests/ -v